function normCol(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

function parseStockNum(v){
  if(v===null||v===undefined)return 0;
  if(typeof v==='number')return v;
  var s=String(v).trim();
  if(!s)return 0;
  // Soporta formato argentino: 1.234,50 / -3,00 y formato simple 1234.50
  var cleaned=s.indexOf(',')!==-1
    ? s.replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'')
    : s.replace(/[^0-9.\-]/g,'');
  var n=parseFloat(cleaned);
  return isNaN(n)?0:n;
}

// Mapa robusto por descripcion normalizada como respaldo.
var _descToFamNorm={};
Object.keys(_descToFam||{}).forEach(function(d){_descToFamNorm[normCol(d)]=_descToFam[d];});

function famFromStockRow(articulo,desc){
  var code=String(articulo||'').trim().toUpperCase();
  // Principal: mapear por codigo, igual que el tablero de compras. Evita omisiones por cambios en la descripcion.
  if(TRELLO_CODE_FAM[code])return TRELLO_CODE_FAM[code];
  // Respaldo: descripcion exacta y normalizada.
  var d=String(desc||'').trim();
  var up=d.toUpperCase();
  if(_descToFam[up])return _descToFam[up];
  var nd=normCol(d);
  if(_descToFamNorm[nd])return _descToFamNorm[nd];
  return null;
}

function gvizStock(url,ok,fail){
  var cb='__gviz_sr_'+Date.now()+'_'+Math.random().toString(36).slice(2);
  var sep=url.indexOf('?')!==-1?'&':'?';
  var script=document.createElement('script');
  var timer=setTimeout(function(){try{delete window[cb];}catch(e){window[cb]=undefined;}script.remove();fail(new Error('Timeout al cargar stock desde Sheets.'));},15000);
  window[cb]=function(data){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}script.remove();ok(data);};
  script.onerror=function(){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}script.remove();fail(new Error('Error al cargar Sheets.'));};
  script.src=url+sep+'tqx=out:json;responseHandler:'+cb+'&_='+(Date.now());
  document.head.appendChild(script);
}

function gvizRowsToRaw(data){
  if(data.status==='error')throw new Error('Sheets: '+(data.errors||[]).map(function(e){return e.message;}).join(', '));
  var rows=(data.table&&data.table.rows)||[];
  var raw=[];
  rows.forEach(function(row){
    var c=row&&row.c?row.c:[];
    function cell(i){return c[i]&&c[i].v!==undefined?c[i].v:'';}
    // Rango B:I => 0 Articulo, 1 Desc, 2 Color, 3 Color Desc, 4 Talle, 5 Talle Desc, 6 CORDOBA2, 7 CORDOBA
    var obj={articulo:cell(0),desc:cell(1),color:cell(2),colorDesc:cell(3),talle:cell(4),cordoba2:cell(6),cordoba:cell(7)};
    if([obj.articulo,obj.desc,obj.color,obj.colorDesc,obj.talle,obj.cordoba2,obj.cordoba].some(function(v){return String(v||'').trim()!=='';}))raw.push(obj);
  });
  return raw;
}

function applyStockRowsMacata(rawRows,sourceLabel){
  var stockMap={},total=0,omitHeader=0,omitNoArt=0,omitNoFam=0;
  window._colorCodeToName={};
  rawRows.forEach(function(r){
    var articulo=String(r.articulo||'').trim();
    if(normCol(articulo)==='articulo'){omitHeader++;return;}
    if(!articulo){omitNoArt++;return;}
    var fam=famFromStockRow(articulo,r.desc);
    if(!fam){omitNoFam++;return;}
    // Para Macata conviene mostrar y cruzar por descripcion de color, porque las NPs usan nombres (BEIGE, NEGRO, AZUL MARINO), no codigos H2/C4/etc.
    var colorCode=String(r.color||'').trim();
    var color=String(r.colorDesc||colorCode).trim();
    if(colorCode&&color)window._colorCodeToName[colorCode.toUpperCase()]=color;
    var talle=String(r.talle!=null?r.talle:'').trim();
    var qty=parseStockNum(r.cordoba)+parseStockNum(r.cordoba2);
    var k=fam+'|'+color+'|'+talle;
    stockMap[k]=(stockMap[k]||0)+qty;
    total+=qty;
  });
  console.log('Stock Macata '+sourceLabel+': '+Object.keys(stockMap).length+' combinaciones / '+rawRows.length+' filas crudas. Omitidas: encabezado='+omitHeader+', sin articulo='+omitNoArt+', fuera Macata='+omitNoFam+'. Total='+Math.round(total));
  renderStockReal(stockMap);
  var kpi=document.getElementById('kpi-stock-fisico');
  if(kpi)kpi.textContent=Math.round(total).toLocaleString('es-AR');
  PROY=[];Object.keys(stockMap).forEach(function(k){var p=k.split('|');PROY.push({familia:p[0],color:p[1],talle:p[2],real:stockMap[k]});});
  renderProyectado('proy-list');
  window._kpiProyBase=Math.round(total+(window._enCamino||0));
  var kpiProy=document.getElementById('kpi-proy');
  if(kpiProy)kpiProy.textContent=Math.round(window._kpiProyBase-(window._trelloProyTotal||0)).toLocaleString('es-AR');
  var hdr=document.querySelector('header span');
  if(hdr)hdr.textContent='Stock al: '+new Date().toLocaleString('es-AR');
  loadTrelloProyMap();
}

function loadStockFromSheets(){
  var container=document.getElementById('stock-list');
  container.innerHTML='<p style="padding:16px;color:#94a3b8">Cargando stock desde Google Sheets...</p>';

  function failMsg(e){container.innerHTML='<p style="padding:16px;color:#dc2626">Error: '+esc(e.message)+'</p>';}

  // Misma solucion del tablero de compras: leer desde B:I porque A/Grupo esta vacia o incompleta y gviz puede cortar filas.
  var url='https://docs.google.com/spreadsheets/d/'+SHEETS_ID_STOCK+'/gviz/tq?gid='+SHEETS_GID_STOCK+'&range=B1:I10000&headers=0';
  gvizStock(url,function(data){
    try{
      var raw=gvizRowsToRaw(data);
      // Si por algun motivo gviz completo devuelve pocas filas, usar bloques como respaldo.
      if(raw.length>=2900){applyStockRowsMacata(raw,'gviz B1:I10000');return;}
      loadStockByBlocks(raw,applyStockRowsMacata,failMsg);
    }catch(e){loadStockByBlocks([],applyStockRowsMacata,failMsg);}
  },function(){loadStockByBlocks([],applyStockRowsMacata,failMsg);});
}

function loadStockByBlocks(initialRows,done,fail){
  var all=[];
  var page=1000,start=1;
  function next(){
    var end=start+page-1;
    var url='https://docs.google.com/spreadsheets/d/'+SHEETS_ID_STOCK+'/gviz/tq?gid='+SHEETS_GID_STOCK+'&range=B'+start+':I'+end+'&headers=0';
    gvizStock(url,function(data){
      try{
        var rows=gvizRowsToRaw(data);
        all=all.concat(rows);
        if(rows.length<page||start>=20000){done(all,'gviz bloques B:I');return;}
        start+=page;next();
      }catch(e){fail(e);}
    },fail);
  }
  next();
}

  html+='<tr class="total-row"><td><strong>TOTAL</strong></td>';talles.forEach(function(t){var v=colTotals[t]||0;html+='<td><strong>'+(v!==0?fmt(v):'&mdash;')+'</strong></td>';});html+='<td class="total-col"><strong>'+fmt(grandTotal)+'</strong></td></tr></tbody></table>';
  return html;
}

function normColor(c){return(c||'').trim().toLowerCase().replace(/(?:^|\s)(\S)/g,function(m,ch){return m[0]===' '?' '+ch.toUpperCase():ch.toUpperCase();});}

var NP_DESC_FAM=[
  {fam:'Cargo Ripstop',        p:['cargo ripstop']},
  {fam:'Cargo Cazador',        p:['cargo cazador']},
  {fam:'Bombacha lisa',        p:['bombacha lisa']},
  {fam:'Cargo elastizado fit', p:['cargo fit','cargo elastizado fit']},
  {fam:'Pantalon de trabajo',  p:['pantalon de trabajo']},
  {fam:'Camisa de trabajo',    p:['camisa de trabajo']}
];
function npDescToFam(desc){
  var d=normCol(desc||'');
  for(var i=0;i<NP_DESC_FAM.length;i++){var e=NP_DESC_FAM[i];for(var j=0;j<e.p.length;j++){if(d.indexOf(e.p[j])!==-1)return e.fam;}}
  return null;
}
function buildNpProyMap(){
  var today=new Date();today.setHours(0,0,0,0);
  var map={};
  NOTAS.forEach(function(np){
    if(np.estado!=='pendiente')return;
    var fe=new Date(np.fecha_emision);fe.setHours(0,0,0,0);
    var dias=Math.round((today-fe)/864e5);
    var falt=30-dias;
    var bucket=falt<=7?'b7':falt<=15?'b15':'b20';
    (np.items||[]).forEach(function(item){
      var fam=npDescToFam(item.descripcion);if(!fam)return;
      var color=normColor((item.color||'').trim());
      var talle=String(item.talle||'').trim();
      var k=fam+'|'+color+'|'+talle;
      if(!map[k])map[k]={b7:0,b15:0,b20:0};
      map[k][bucket]+=(item.cantidad_solicitada||0);
    });
  });
  return map;
}
var _ttActiveCell=null;

  e.stopPropagation();
  var tt=document.getElementById('proy-tt');
  if(_ttActiveCell===cell&&tt.style.display==='block'){tt.style.display='none';_ttActiveCell=null;return;}
  _ttActiveCell=cell;
  var real=+(cell.getAttribute('data-real'))||0;
  var b7=+(cell.getAttribute('data-b7'))||0;
  var b15=+(cell.getAttribute('data-b15'))||0;
  var b20=+(cell.getAttribute('data-b20'))||0;
  var trello=+(cell.getAttribute('data-trello'))||0;
  var total=real+b7+b15+b20-trello;
  var trelloRow=trello?'<tr><td colspan="2"><div class="tt-sep"></div></td></tr><tr><td>Pedidos Trello</td><td class="tt-val" style="color:#dc2626">'+fmt(-trello)+'</td></tr>':'';
  tt.innerHTML='<div class="tt-title">Desglose proyectado</div>'+
    '<table>'+
    '<tr><td>Stock real</td><td class="tt-val">'+fmt(real)+'</td></tr>'+
    '<tr><td colspan="2"><div class="tt-sep"></div></td></tr>'+
    '<tr><td>NP proy. 7 d\xEDas</td><td class="tt-val">'+fmt(b7)+'</td></tr>'+
    '<tr><td>NP proy. 15 d\xEDas</td><td class="tt-val">'+fmt(b15)+'</td></tr>'+
    '<tr><td>NP proy. +20 d\xEDas</td><td class="tt-val">'+fmt(b20)+'</td></tr>'+
    trelloRow+
    '<tr class="tt-total"><td>Total proyectado</td><td class="tt-val">'+fmt(total)+'</td></tr>'+
    '</table>';
  tt.style.display='block';
  var x=e.clientX+16,y=e.clientY-14;
  var w=tt.offsetWidth||280,h=tt.offsetHeight||170;
  if(x+w>window.innerWidth-10)x=e.clientX-w-10;
  if(y+h>window.innerHeight-10)y=window.innerHeight-h-10;

  tt.style.left=x+'px';tt.style.top=y+'px';
}

function loadTrelloProyMap(){
  var key='944a71628ede0c2574331cd84636a178';
  var tok='ATTAfbaac5a9d64f55d0d257822592589de5444aab8e7e0e074826fc2d3ecf5331f5BFB4BD6F';
  var board='3sWRgjJ3';
  function tApi(ep){var sep=ep.indexOf('?')!==-1?'&':'?';return fetch('https://api.trello.com/1'+ep+sep+'key='+key+'&token='+tok).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}
  Promise.all([
    tApi('/boards/'+board+'/lists?'),
    tApi('/boards/'+board+'/customFields?'),
    tApi('/boards/'+board+'/cards?customFieldItems=true&fields=name,idList&')
  ]).then(function(res){
    var lists=res[0],fDefs=res[1],cards=res[2];
    var defMap={};(fDefs||[]).forEach(function(f){defMap[f.id]=f.name;});
    var pedidoIds={};
    (lists||[]).forEach(function(l){if((l.name||'').toLowerCase().indexOf('pedido')!==-1)pedidoIds[l.id]=1;});
    var tMap={};
    (cards||[]).forEach(function(card){
      if(!pedidoIds[card.idList])return;
      var fMap={};
      (card.customFieldItems||[]).forEach(function(item){
        var name=defMap[item.idCustomField]||'';if(!name)return;
        var val='';
        if(item.value){if(item.value.text!==undefined)val=item.value.text;else if(item.value.number!==undefined)val=String(item.value.number);}
        else if(item.idValue){var fd=(fDefs||[]).find(function(f){return f.id===item.idCustomField;});if(fd&&fd.options){var op=fd.options.find(function(o){return o.id===item.idValue;});if(op&&op.value&&op.value.text)val=op.value.text;}}
        if(val!=='')fMap[name]=val;
      });
      for(var i=1;i<=10;i++){
        var skuVal='',qtyVal='',statusVal='';
        Object.keys(fMap).forEach(function(n){var nl=n.toLowerCase();if(nl==='falta sku '+i||nl==='falta sku'+i)skuVal=fMap[n];if(nl==='cantidad sku '+i||nl==='cantidad sku'+i)qtyVal=fMap[n];if(nl==='status sku '+i||nl==='status sku'+i)statusVal=fMap[n];});
        if(!skuVal)continue;
        if(statusVal.toLowerCase()!=='pedido')continue;
        var parts=skuVal.trim().split('-');if(parts.length<3)continue;
        var talle=parts[parts.length-1];var colorRaw=parts[parts.length-2];
        var codigo=parts.slice(0,parts.length-2).join('-').toUpperCase();
        var fam=TRELLO_CODE_FAM[codigo];if(!fam)continue;
        var qty=parseFloat(qtyVal)||1;
        var colorNom=(window._colorCodeToName||{})[colorRaw.toUpperCase()]||colorRaw;
        var k=fam+'|'+normColor(colorNom)+'|'+talle;
        tMap[k]=(tMap[k]||0)+qty;
      }
    });
    window._trelloProyTotal=Object.keys(tMap).reduce(function(s,k){return s+tMap[k];},0);
    window._trelloProyMap=tMap;
    renderProyectado('proy-list');
    var kp=document.getElementById('kpi-proy');
    if(kp&&window._kpiProyBase!==undefined)kp.textContent=Math.round(window._kpiProyBase-window._trelloProyTotal).toLocaleString('es-AR');
  }).catch(function(e){console.warn('Trello proy:',e.message);});
}

function renderProyectado(containerId){
  var npMap=buildNpProyMap();
  var trelloMap=window._trelloProyMap||{};
  var proyLookup={};
  PROY.forEach(function(r){var k=r.familia+'|'+normColor(r.color)+'|'+r.talle;proyLookup[k]=(proyLookup[k]||0)+(r.real||0);});
  var html='';
  ORDEN_FAMILIAS.forEach(function(fam,idx){
    var colorSet={},talleSet={};
    PROY.filter(function(r){return r.familia===fam;}).forEach(function(r){colorSet[normColor(r.color)]=1;talleSet[r.talle]=1;});
    Object.keys(npMap).forEach(function(k){var p=k.split('|');if(p[0]===fam){colorSet[p[1]]=1;talleSet[p[2]]=1;}});
    var colors=Object.keys(colorSet).sort();
    var talles=Object.keys(talleSet).sort(function(a,b){return talleSortKey(a)<talleSortKey(b)?-1:talleSortKey(a)>talleSortKey(b)?1:0;});
    var famTotal=0;
    var gkey=containerId+'_'+idx;
    var tblBody='';
    if(colors.length){
      var colTotals={};talles.forEach(function(t){colTotals[t]=0;});
      colors.forEach(function(color){
        var rowTotal=0;
        var cells=talles.map(function(t){
          var k=fam+'|'+color+'|'+t;
          var real=proyLookup[k]||0;
          var np=npMap[k]||{b7:0,b15:0,b20:0};
          var trello=trelloMap[k]||0;
          var total=real+np.b7+np.b15+np.b20-trello;
          colTotals[t]+=total;rowTotal+=total;
          return{total:total,real:real,b7:np.b7,b15:np.b15,b20:np.b20,trello:trello};
        });
        famTotal+=rowTotal;
        tblBody+='<tr><td class="color-cell">'+esc(color)+'</td>';
        cells.forEach(function(c){
          var v=c.total;var cls=v>0?'ok':v<0?'neg':'zero';
          tblBody+='<td class="'+cls+'" data-real="'+c.real+'" data-b7="'+c.b7+'" data-b15="'+c.b15+'" data-b20="'+c.b20+'" data-trello="'+c.trello+'"'+
               ' onclick="toggleProyTT(this,event)" style="cursor:pointer">'+
               (v!==0?fmt(Math.round(v)):'&mdash;')+'</td>';
        });
        tblBody+='<td class="total-col '+(rowTotal>0?'ok':rowTotal<0?'neg':'zero')+'"><strong>'+fmt(Math.round(rowTotal))+'</strong></td></tr>';
      });
      var footer='<tr class="total-row"><td><strong>TOTAL</strong></td>';
      talles.forEach(function(t){var v=colTotals[t]||0;footer+='<td><strong>'+(v!==0?fmt(Math.round(v)):'&mdash;')+'</strong></td>';});
      footer+='<td class="total-col"><strong>'+fmt(Math.round(famTotal))+'</strong></td></tr>';
      var tbl='<table class="matrix-table"><thead><tr><th class="col-color">Color</th>';
      talles.forEach(function(t){tbl+='<th>'+esc(t)+'</th>';});
      tbl+='<th class="total-col">Total</th></tr></thead><tbody>'+tblBody+footer+'</tbody></table>';
      html+='<div class="fam-block"><div class="fam-hdr" onclick="toggleFam(\''+gkey+'\')"><span class="fam-title">'+esc(fam)+'</span><span class="fam-total">'+fmt(Math.round(famTotal))+' uds</span><span class="fam-arr" id="farr-'+gkey+'">&#9660;</span></div><div class="fam-body" id="fbody-'+gkey+'">'+tbl+'</div></div>';
    }else{
      html+='<div class="fam-block"><div class="fam-hdr" onclick="toggleFam(\''+gkey+'\')"><span class="fam-title">'+esc(fam)+'</span><span class="fam-total">0 uds</span><span class="fam-arr" id="farr-'+gkey+'">&#9660;</span></div><div class="fam-body" id="fbody-'+gkey+'"><p style="padding:10px;color:#94a3b8;font-size:.82rem">Sin datos.</p></div></div>';
    }
  });
  document.getElementById(containerId).innerHTML=html||'<p style="padding:16px;color:#94a3b8">Sin datos.</p>';
}

function renderPedido(containerId){
  var npMap=buildNpProyMap();
  // Collect all fam|color|talle keys present in npMap
  var famColorTalle={};
  Object.keys(npMap).forEach(function(k){
    var p=k.split('|');var fam=p[0];
    if(!famColorTalle[fam])famColorTalle[fam]={colorSet:{},talleSet:{}};
    famColorTalle[fam].colorSet[p[1]]=1;
    famColorTalle[fam].talleSet[p[2]]=1;
  });
  var html='';
  ORDEN_FAMILIAS.forEach(function(fam,idx){
    var gkey=containerId+'_'+idx;
    var data=famColorTalle[fam];
    if(!data||!Object.keys(data.colorSet).length){
      html+='<div class="fam-block"><div class="fam-hdr" onclick="toggleFam(\''+gkey+'\')"><span class="fam-title">'+esc(fam)+'</span><span class="fam-total">0 uds</span><span class="fam-arr" id="farr-'+gkey+'">&#9660;</span></div><div class="fam-body" id="fbody-'+gkey+'"><p style="padding:10px;color:#94a3b8;font-size:.82rem">Sin NPs pendientes.</p></div></div>';
      return;
    }
    var colors=Object.keys(data.colorSet).sort();
    var talles=Object.keys(data.talleSet).sort(function(a,b){return talleSortKey(a)<talleSortKey(b)?-1:talleSortKey(a)>talleSortKey(b)?1:0;});
    var colTotals={};talles.forEach(function(t){colTotals[t]=0;});
    var famTotal=0,tblBody='';
    colors.forEach(function(color){
      var rowTotal=0;
      var cells=talles.map(function(t){
        var k=fam+'|'+color+'|'+t;
        var np=npMap[k]||{b7:0,b15:0,b20:0};
        var v=np.b7+np.b15+np.b20;
        colTotals[t]+=v;rowTotal+=v;return{total:v,b7:np.b7,b15:np.b15,b20:np.b20};
      });
      famTotal+=rowTotal;
      tblBody+='<tr><td class="color-cell">'+esc(color)+'</td>';
      cells.forEach(function(c){var cls=c.total>0?'ok':'zero';tblBody+='<td class="'+cls+'" data-real="0" data-b7="'+c.b7+'" data-b15="'+c.b15+'" data-b20="'+c.b20+'" onclick="toggleProyTT(this,event)" style="cursor:pointer">'+(c.total>0?fmt(c.total):'&mdash;')+'</td>';});
      tblBody+='<td class="total-col '+(rowTotal>0?'ok':'zero')+'"><strong>'+(rowTotal>0?fmt(rowTotal):'&mdash;')+'</strong></td></tr>';
    });
    var footer='<tr class="total-row"><td><strong>TOTAL</strong></td>';
    talles.forEach(function(t){var v=colTotals[t]||0;footer+='<td><strong>'+(v?fmt(v):'&mdash;')+'</strong></td>';});
    footer+='<td class="total-col"><strong>'+fmt(famTotal)+'</strong></td></tr>';
    var tbl='<table class="matrix-table"><thead><tr><th class="col-color">Color</th>';
    talles.forEach(function(t){tbl+='<th>'+esc(t)+'</th>';});
    tbl+='<th class="total-col">Total</th></tr></thead><tbody>'+tblBody+footer+'</tbody></table>';
    html+='<div class="fam-block"><div class="fam-hdr" onclick="toggleFam(\''+gkey+'\')"><span class="fam-title">'+esc(fam)+'</span><span class="fam-total">'+fmt(famTotal)+' uds</span><span class="fam-arr" id="farr-'+gkey+'">&#9660;</span></div><div class="fam-body" id="fbody-'+gkey+'">'+tbl+'</div></div>';
  });
  document.getElementById(containerId).innerHTML=html||'<p style="padding:16px;color:#94a3b8">Sin datos.</p>';
}
